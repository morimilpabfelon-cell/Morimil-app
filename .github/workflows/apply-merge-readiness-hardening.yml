name: Apply merge-readiness hardening

on:
  push:
    branches:
      - agent/prepare-genesis-ultra-body-v0-1
    paths:
      - .github/patches/merge-readiness-hardening.patch
      - .github/workflows/apply-merge-readiness-hardening.yml

permissions:
  contents: write

concurrency:
  group: apply-merge-readiness-hardening
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out preparation branch
        uses: actions/checkout@v4
        with:
          ref: agent/prepare-genesis-ultra-body-v0-1
          fetch-depth: 0

      - name: Validate and apply patch
        shell: bash
        run: |
          set -euo pipefail
          patch_file=.github/patches/merge-readiness-hardening.patch
          if [[ ! -f "$patch_file" ]]; then
            echo "Patch already consumed."
            exit 0
          fi
          git apply --check "$patch_file"
          git apply "$patch_file"
          rm "$patch_file"
          git diff --check

      - name: Commit applied patch
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "genesis-body-ci"
          git config user.email "genesis-body-ci@users.noreply.github.com"
          git add app/src/main/java/com/morimil/app/data/genesis/ultra/GenesisUltraContracts.kt
          git add app/src/main/java/com/morimil/app/data/genesis/ultra/GenesisUltraTrust.kt
          git add app/src/main/java/com/morimil/app/ui/OnboardingScreen.kt
          git add -A .github/patches/merge-readiness-hardening.patch
          git commit -m "Harden protocol parsing and detach legacy onboarding"
          git push origin HEAD:refs/heads/agent/prepare-genesis-ultra-body-v0-1
