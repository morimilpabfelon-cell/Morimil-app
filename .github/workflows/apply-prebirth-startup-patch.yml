name: Apply audited pre-birth startup patch

on:
  push:
    branches:
      - agent/prepare-genesis-ultra-body-v0-1
    paths:
      - .github/patches/prebirth-startup.patch
      - .github/workflows/apply-prebirth-startup-patch.yml

permissions:
  contents: write

concurrency:
  group: apply-prebirth-startup-patch
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out preparation branch
        uses: actions/checkout@v4
        with:
          ref: agent/prepare-genesis-ultra-body-v0-1
          fetch-depth: 0

      - name: Validate and apply patch
        shell: bash
        run: |
          set -euo pipefail
          patch_file=.github/patches/prebirth-startup.patch
          if [[ ! -f "$patch_file" ]]; then
            echo "Patch already consumed; no action required."
            exit 0
          fi
          git apply --check "$patch_file"
          git apply "$patch_file"
          rm "$patch_file"
          git diff --check

      - name: Commit applied patch
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet && git diff --cached --quiet; then
            echo "No patch changes to commit."
            exit 0
          fi
          git config user.name "genesis-body-ci"
          git config user.email "genesis-body-ci@users.noreply.github.com"
          git add app/src/main/java/com/morimil/app/ui/MorimilViewModel.kt
          git add app/src/main/java/com/morimil/app/data/repository/MemoryRepository.kt
          git add app/src/main/java/com/morimil/app/data/repository/AgentOrchestrationRepository.kt
          git add -A .github/patches/prebirth-startup.patch
          git commit -m "Block durable runtime startup before complete birth"
          git push origin HEAD:refs/heads/agent/prepare-genesis-ultra-body-v0-1
