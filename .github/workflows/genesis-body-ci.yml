name: Genesis Body Preparation

on:
  pull_request:
    branches: [main]
  push:
    branches:
      - agent/prepare-genesis-ultra-body-v0-1
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: genesis-body-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Validate wrapper and project
        run: ./gradlew --no-daemon --stacktrace --console=plain help

      - name: Run unit tests
        shell: bash
        run: |
          set +e
          ./gradlew --no-daemon --stacktrace --console=plain :app:testDebugUnitTest > unit-test.log 2>&1
          status=$?
          tail -n 250 unit-test.log
          exit "$status"

      - name: Run Android lint
        run: ./gradlew --no-daemon --stacktrace --console=plain :app:lintDebug

      - name: Build debug APK and instrumentation tests
        run: ./gradlew --no-daemon --stacktrace --console=plain :app:assembleDebug :app:assembleDebugAndroidTest

      - name: Upload diagnostic reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: morimil-validation-reports
          if-no-files-found: ignore
          path: |
            unit-test.log
            app/build/reports/**
            app/build/test-results/**
            app/build/outputs/apk/debug/**
            app/src/main/java/com/morimil/app/ui/MorimilViewModel.kt
            app/src/main/java/com/morimil/app/data/repository/AgentOrchestrationRepository.kt
