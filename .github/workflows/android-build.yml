name: Android Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  assemble-debug:
    name: Test and assemble debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Print Gradle version
        run: ./gradlew --version --console=plain

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --console=plain

      - name: Assemble debug
        run: ./gradlew :app:assembleDebug --console=plain
