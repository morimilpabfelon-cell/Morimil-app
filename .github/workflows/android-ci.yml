name: Android CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Set up JDK
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Test deliberative artifact certifier
        run: python -m unittest discover -s tools/model-artifacts -p 'test_*.py'

      - name: Validate frozen trimotor evidence
        id: validate-frozen-trimotor-evidence
        continue-on-error: true
        run: |
          set -o pipefail
          {
            python tools/benchmarks/validate_trimotor_v02_physical_benchmark_evidence_v1.py check
            python tools/benchmarks/test_validate_trimotor_v02_physical_benchmark_evidence_v1.py
            python tools/benchmarks/validate_trimotor_v02_physical_benchmark_evidence_v2.py check
            python tools/benchmarks/test_validate_trimotor_v02_physical_benchmark_evidence_v2.py
          } > current-trimotor-evidence-validation.log 2>&1

      - name: Upload trimotor evidence validation diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: current-trimotor-evidence-validation
          path: current-trimotor-evidence-validation.log
          if-no-files-found: error
          retention-days: 7

      - name: Enforce trimotor evidence validation
        if: steps.validate-frozen-trimotor-evidence.outcome == 'failure'
        run: |
          cat current-trimotor-evidence-validation.log
          exit 1

      - name: Test deliberative comparative benchmark
        run: |
          python -m unittest discover -s tools/benchmarks -p 'test_*.py'
          python tools/benchmarks/morimil_deliberative_benchmark_v0.py check
          python tools/benchmarks/validate_v02_baseline_evidence_v0.py check
          python tools/benchmarks/validate_v02_physical_benchmark_evidence_v1.py check

      - name: Test Android arm64 host tools
        run: |
          python tools/android-arm64/run_gemma3n_e2b_arm64_unplugged_energy_v0.py --self-test
          python tools/android-arm64/run_gemma3n_e2b_arm64_unplugged_energy_v0_1.py --self-test
          python tools/android-arm64/run_gemma3n_e2b_arm64_deliberative_benchmark_v0.py --self-test
          python tools/android-arm64/run_gemma3n_e2b_arm64_trimotor_benchmark_v0.py --self-test
          python tools/android-arm64/run_current_gemma3n_e2b_arm64_trimotor_benchmark_v0.py --self-test
          python tools/android-arm64/test_current_trimotor_physical_evidence_v0.py
          python tools/android-arm64/test_run_gemma3n_e2b_arm64_deliberative_benchmark_v0.py
          python tools/android-arm64/test_physical_benchmark_adb_v0.py

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug
