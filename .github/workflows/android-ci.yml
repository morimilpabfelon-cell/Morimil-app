name: Android CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - v2-body-runtime

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Test deliberative artifact certifier
        run: python -m unittest discover -s tools/model-artifacts -p 'test_*.py'

      - name: Test Android arm64 host tools
        run: python tools/android-arm64/run_gemma3n_e2b_arm64_unplugged_energy_v0.py --self-test

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug
